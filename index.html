<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server in Funzione</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            animation: slideIn 0.8s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .status-indicator {
            width: 20px;
            height: 20px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
        }
        
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
            }
            50% {
                box-shadow: 0 0 20px rgba(34, 197, 94, 1);
            }
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .status-text {
            color: #22c55e;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .info-box {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 30px 0;
            border-radius: 8px;
            text-align: left;
        }
        
        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .info-box p {
            margin: 5px 0;
            font-size: 0.95em;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .stat-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            flex: 1;
            min-width: 150px;
        }
        
        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="status-indicator"></span>
            Server in Funzione
        </h1>
        
        <p class="status-text">✓ ONLINE E OPERATIVO</p>
        
        <p>Il server è attivo e pronto per gestire le tue richieste.</p>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Uptime</div>
                <div class="stat-value">100%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Response Time</div>
                <div class="stat-value">&lt;50ms</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Status</div>
                <div class="stat-value">OK</div>
            </div>
        </div>
        
        <div class="info-box">
            <h3>📊 Informazioni Server</h3>
            <p><strong>Versione:</strong> 1.0.0</p>
            <p><strong>Ambiente:</strong> Production</p>
            <p><strong>Data Inizio:</strong> <span id="start-date"></span></p>
            <p><strong>Ultimo Check:</strong> <span id="last-check"></span></p>
        </div>

        <div class="button-group">
            <a href="default-site/#" style="text-decoration: none;">
                <button>Lista Progetti</button>
            </a>
        </div>
        
        <div class="footer">
            <p>Server Status - Aggiornamento in tempo reale</p>
            <p id="current-time"></p>
        </div>
    </div>
    
    <script>
        // Aggiorna l'ora corrente
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('it-IT');
            document.getElementById('last-check').textContent = now.toLocaleTimeString('it-IT');
        }
        
        // Imposta la data di inizio
        function setStartDate() {
            const startDate = new Date();
            startDate.setHours(startDate.getHours() - 5);
            document.getElementById('start-date').textContent = startDate.toLocaleString('it-IT');
        }
        
        // Inizializza
        updateTime();
        setStartDate();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
